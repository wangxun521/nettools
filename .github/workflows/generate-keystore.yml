name: Generate Release Keystore (one-shot)

# 只能手动触发。运行一次，把产物保存为 GitHub Secrets 后就可以删掉这个文件。
on:
  workflow_dispatch:
    inputs:
      key_alias:
        description: '密钥别名 (key alias)'
        required: true
        default: 'nettools'
      validity_years:
        description: '有效期（年）'
        required: true
        default: '25'
      dname:
        description: 'X.500 主题，例如 CN=NetTools, O=Personal, C=CN'
        required: true
        default: 'CN=NetTools, O=Personal, C=CN'

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Generate random passwords
        id: pw
        run: |
          STORE_PW=$(openssl rand -base64 24 | tr -d '/+=' | cut -c1-24)
          KEY_PW=$(openssl rand -base64 24 | tr -d '/+=' | cut -c1-24)
          # 写到 step outputs 不会出现在日志里（GitHub 会自动 mask）
          echo "::add-mask::$STORE_PW"
          echo "::add-mask::$KEY_PW"
          echo "store_pw=$STORE_PW" >> "$GITHUB_OUTPUT"
          echo "key_pw=$KEY_PW" >> "$GITHUB_OUTPUT"

      - name: Generate keystore
        env:
          STORE_PW: ${{ steps.pw.outputs.store_pw }}
          KEY_PW: ${{ steps.pw.outputs.key_pw }}
        run: |
          VALIDITY_DAYS=$(( ${{ github.event.inputs.validity_years }} * 365 ))
          keytool -genkeypair -v \
            -keystore release.keystore \
            -alias "${{ github.event.inputs.key_alias }}" \
            -keyalg RSA -keysize 2048 \
            -validity "$VALIDITY_DAYS" \
            -storepass "$STORE_PW" \
            -keypass "$KEY_PW" \
            -dname "${{ github.event.inputs.dname }}"

      - name: Base64 encode + write secrets bundle
        env:
          STORE_PW: ${{ steps.pw.outputs.store_pw }}
          KEY_PW: ${{ steps.pw.outputs.key_pw }}
        run: |
          base64 -w0 release.keystore > release.keystore.b64
          cat > SECRETS_TO_ADD.txt <<EOF
          ===========================================================
          请把以下 4 个值添加到仓库的 Secrets:
          Settings -> Secrets and variables -> Actions -> New repository secret
          ===========================================================

          Name : RELEASE_KEYSTORE_BASE64
          Value: (复制 release.keystore.b64 文件的全部内容，单行很长)

          Name : RELEASE_KEYSTORE_PASSWORD
          Value: $STORE_PW

          Name : RELEASE_KEY_ALIAS
          Value: ${{ github.event.inputs.key_alias }}

          Name : RELEASE_KEY_PASSWORD
          Value: $KEY_PW

          ===========================================================
          重要:
          1) 立即把这 4 个值复制到 Secrets，然后删除本次 workflow run
             (Actions -> 这次运行 -> 右上角 ... -> Delete workflow run)
             这样密码就不会留在 GitHub 上任何地方。
          2) 同时建议把 .github/workflows/generate-keystore.yml 删除掉，
             避免别人误触发再生成一份新 keystore。
          3) 把 release.keystore 文件也下载一份本地存好作为备份
             (Base64 之前的原始 keystore)，丢了就再也签不出同一个证书。
          EOF

      - name: Upload bundle
        uses: actions/upload-artifact@v4
        with:
          name: keystore-bundle-DELETE-AFTER-USE
          path: |
            release.keystore
            release.keystore.b64
            SECRETS_TO_ADD.txt
          retention-days: 1
