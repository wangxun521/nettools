name: Generate Release Keystore (one-shot)

# 一次性 keystore 生成器。用完请删除本次 run 和这个 yml 文件。
on:
  workflow_dispatch:
    inputs:
      password:
        description: '签名密码（store 和 key 都用这一个，自己记好）'
        required: true
      key_alias:
        description: '密钥别名'
        required: true
        default: 'nettools'
      validity_years:
        description: '有效期（年）'
        required: true
        default: '25'
      dname:
        description: 'X.500 主题'
        required: true
        default: 'CN=NetTools, O=Personal, C=CN'

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Mask password
        run: echo "::add-mask::${{ github.event.inputs.password }}"

      - name: Generate keystore
        env:
          PW: ${{ github.event.inputs.password }}
        run: |
          VALIDITY_DAYS=$(( ${{ github.event.inputs.validity_years }} * 365 ))
          keytool -genkeypair -v \
            -keystore release.keystore \
            -alias "${{ github.event.inputs.key_alias }}" \
            -keyalg RSA -keysize 2048 \
            -validity "$VALIDITY_DAYS" \
            -storepass "$PW" \
            -keypass "$PW" \
            -dname "${{ github.event.inputs.dname }}"

      - name: Base64 encode + write secrets bundle
        run: |
          base64 -w0 release.keystore > release.keystore.b64
          cat > SECRETS_TO_ADD.txt <<EOF
          ===========================================================
          仓库 Settings -> Secrets and variables -> Actions
          添加 / 更新 以下 4 个 Secret（注意 store 和 key 密码同一个值）
          ===========================================================

          Name : RELEASE_KEYSTORE_BASE64
          Value: 复制 release.keystore.b64 文件全部内容（单行）

          Name : RELEASE_KEYSTORE_PASSWORD
          Value: <你刚才输入的密码>

          Name : RELEASE_KEY_ALIAS
          Value: ${{ github.event.inputs.key_alias }}

          Name : RELEASE_KEY_PASSWORD
          Value: <你刚才输入的密码>   (和上面 KEYSTORE_PASSWORD 完全相同)

          ===========================================================
          完成后：
          1) 删掉本次 workflow run
          2) 删掉 .github/workflows/generate-keystore.yml
          3) release.keystore 文件保存到本地安全位置（备份）
          EOF

      - name: Upload bundle
        uses: actions/upload-artifact@v4
        with:
          name: keystore-bundle-DELETE-AFTER-USE
          path: |
            release.keystore
            release.keystore.b64
            SECRETS_TO_ADD.txt
          retention-days: 1
