name: Build Android APK

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master' }}

      - name: Generate Gradle wrapper (if missing)
        run: |
          if [ ! -x ./gradlew ]; then
            gradle wrapper --gradle-version 8.5
          fi
          chmod +x ./gradlew

      - name: Accept Android SDK licenses
        run: yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses >/dev/null || true

      # ---------- Debug ----------
      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: nettools-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 14

      # ---------- Release (only if keystore secret exists) ----------
      - name: Decode release keystore
        id: keystore
        if: ${{ env.HAS_KEYSTORE == 'true' }}
        env:
          HAS_KEYSTORE: ${{ secrets.RELEASE_KEYSTORE_BASE64 != '' }}
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          echo "$RELEASE_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"
          echo "path=$RUNNER_TEMP/release.keystore" >> "$GITHUB_OUTPUT"

      - name: Build signed release APK
        if: ${{ steps.keystore.outputs.path != '' }}
        env:
          RELEASE_KEYSTORE_PATH: ${{ steps.keystore.outputs.path }}
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease --no-daemon --stacktrace

      - name: Upload release APK
        if: ${{ steps.keystore.outputs.path != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: nettools-release-apk
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Cleanup keystore
        if: ${{ always() && steps.keystore.outputs.path != '' }}
        run: rm -f "${{ steps.keystore.outputs.path }}"
